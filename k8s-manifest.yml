# ==========================================
# 1. BANCO DE DADOS (POSTGRESQL)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_USER
          value: "admin"
        - name: POSTGRES_PASSWORD
          value: "senha123"
        - name: POSTGRES_DB
          value: "trabalho_db"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

---
# ==========================================
# 2. MICROSSERVIÇO DE NEGÓCIO (API PEDIDOS)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: negocio-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: negocio-api
  template:
    metadata:
      labels:
        app: negocio-api
    spec:
      containers:
      - name: negocio-api
        image: negocio-api:latest
        imagePullPolicy: Never
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-service:5432/trabalho_db"
        - name: SPRING_DATASOURCE_USERNAME
          value: "admin"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "senha123"
---
apiVersion: v1
kind: Service
metadata:
  name: negocio-service
spec:
  selector:
    app: negocio-api
  ports:
    - port: 8080
      targetPort: 8080

---
# ==========================================
# 3. API GATEWAY
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-api
  template:
    metadata:
      labels:
        app: gateway-api
    spec:
      containers:
      - name: gateway-api
        image: gateway-api:latest
        imagePullPolicy: Never
        env:
        - name: NEGOCIO_API_URL
          value: "http://negocio-service:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
spec:
  type: NodePort
  selector:
    app: gateway-api
  ports:
    - port: 8080
      targetPort: 8081
      nodePort: 30000